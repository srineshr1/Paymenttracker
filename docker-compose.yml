services:
  postgres:
    image: postgres:16-alpine
    container_name: paymenttracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: paymenttracker
      POSTGRES_PASSWORD: paymenttracker
      POSTGRES_DB: paymenttracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paymenttracker -d paymenttracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
