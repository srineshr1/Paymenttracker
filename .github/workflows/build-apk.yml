name: Build APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w @paymenttracker/shared

      - name: Prebuild Android project
        working-directory: apps/mobile
        run: |
          if [ ! -f .env ]; then
            echo "EXPO_PUBLIC_API_URL=https://api.example.com" > .env
          fi
          npx expo prebuild --platform android --non-interactive

      - name: Build release APK
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Prepare APK
        id: apk
        run: |
          mkdir -p /tmp/release
          SRC=$(find apps/mobile/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$SRC" ]; then
            echo "APK not found"
            find apps/mobile/android/app/build/outputs -type f
            exit 1
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            NAME="spentd-${GITHUB_REF_NAME}.apk"
          else
            NAME="spentd-build-${{ github.run_number }}.apk"
          fi
          cp "$SRC" "/tmp/release/$NAME"
          ls -lh "/tmp/release/$NAME"
          echo "path=/tmp/release/$NAME" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spentd-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Publish GitHub Release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Spentd APK #${{ github.run_number }}"
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
